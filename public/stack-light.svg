      <g>
      <circle cx="1468" cy="190" r="22" fill="none" stroke="#1f2328" stroke-width="1" opacity="0.55"/>
      <circle cx="1492" cy="190" r="22" fill="none" stroke="#1f2328" stroke-width="1" opacity="0.55"/>
      <circle cx="1480" cy="178" r="14" fill="#1f2328" opacity="0.18"/>
    </g>

      <text x="852" y="174" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="3">RENDERING</text>
      <text x="852" y="218" font-size="32" font-family="Georgia, serif" fill="#1f2328" font-weight="300">Three.js scene</text>

      <line x1="852" y1="238" x2="940" y2="238" stroke="#1f2328" stroke-width="0.6" opacity="0.6"/>

      
        <text x="852" y="274" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">strict 1:1 tensor mapping</text>
      
        <text x="852" y="302" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">PCA-derived 3D layout</text>
      
        <text x="852" y="330" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">audio sonification</text>
      
        <text x="852" y="358" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">soft Gaussian sprite mode</text>
      
        <text x="852" y="386" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">draggable, dockable panels</text>
      
    
      <rect x="60" y="430" width="720" height="270" rx="6" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.5" opacity="0.95"/>

      <!-- glyph in top-right of card -->
      <g><rect x="694" y="468" width="52" height="5" fill="#1f2328" opacity="0.85"/><rect x="694" y="479" width="48" height="5" fill="#1f2328" opacity="0.72"/><rect x="694" y="490" width="44" height="5" fill="#1f2328" opacity="0.59"/><rect x="694" y="501" width="40" height="5" fill="#1f2328" opacity="0.45999999999999996"/><rect x="694" y="512" width="36" height="5" fill="#1f2328" opacity="0.32999999999999996"/></g>

      <text x="92" y="474" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="3">WEIGHTS</text>
      <text x="92" y="518" font-size="32" font-family="Georgia, serif" fill="#1f2328" font-weight="300">Phi-3-mini · MLC</text>

      <line x1="92" y1="538" x2="180" y2="538" stroke="#1f2328" stroke-width="0.6" opacity="0.6"/>

      
        <text x="92" y="574" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">~1.94 GB on disk</text>
      
        <text x="92" y="602" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">Cache API + OPFS</text>
      
        <text x="92" y="630" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">streaming progressive load</text>
      
        <text x="92" y="658" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">instant reload on return</text>
      
        <text x="92" y="686" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">verifiable HF source</text>
      
    
      <rect x="820" y="430" width="720" height="270" rx="6" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.5" opacity="0.95"/>

      <!-- glyph in top-right of card -->
      <g>
      <rect x="1450" y="470" width="60" height="40" rx="3" fill="none" stroke="#1f2328" stroke-width="1" opacity="0.7"/>
      <line x1="1450" y1="480" x2="1510" y2="480" stroke="#1f2328" stroke-width="1" opacity="0.7"/>
      <circle cx="1455" cy="475" r="1.8" fill="#1f2328" opacity="0.7"/>
      <circle cx="1461" cy="475" r="1.8" fill="#1f2328" opacity="0.7"/>
      <circle cx="1467" cy="475" r="1.8" fill="#1f2328" opacity="0.7"/>
    </g>

      <text x="852" y="474" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="3">UI</text>
      <text x="852" y="518" font-size="32" font-family="Georgia, serif" fill="#1f2328" font-weight="300">Vanilla TypeScript</text>

      <line x1="852" y1="538" x2="940" y2="538" stroke="#1f2328" stroke-width="0.6" opacity="0.6"/>

      
        <text x="852" y="574" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">zero runtime frameworks</text>
      
        <text x="852" y="602" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">Vite (dev + build only)</text>
      
        <text x="852" y="630" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">5 view modes, 4 overlays</text>
      
        <text x="852" y="658" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">every claim CI-verified</text>
      
        <text x="852" y="686" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">a single static export</text>
      
    

  <!-- center divider lines connecting the 4 cards visually -->
  <line x1="800" y1="160" x2="800" y2="670" stroke="#1f2328" stroke-width="0.3" opacity="0.18"/>
