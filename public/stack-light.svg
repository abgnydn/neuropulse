      <text x="92" y="174" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="3">INFERENCE</text>
      <text x="92" y="218" font-size="32" font-family="Georgia, serif" fill="#1f2328" font-weight="300">WebGPU compute</text>

      <line x1="92" y1="238" x2="180" y2="238" stroke="#1f2328" stroke-width="0.6" opacity="0.6"/>

      
        <text x="92" y="274" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">11 WGSL kernels</text>
      
        <text x="92" y="302" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">f32 accumulators</text>
      
        <text x="92" y="330" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">292 dispatches / token</text>
      
        <text x="92" y="358" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">q4f16_1 quantization</text>
      
        <text x="92" y="386" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" opacity="0.92">no framework on the hot path</text>
      
    
      <rect x="820" y="130" width="720" height="270" rx="6" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.5" opacity="0.95"/>

