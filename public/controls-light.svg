<svg viewBox="0 0 1600 1140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Controls and modes — 5 view modes, 4 overlays, plus the keymap">
  <rect width="1600" height="1140" fill="#fafafa"/>
  <text x="800" y="56" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" text-anchor="middle" letter-spacing="4">CONTROLS &amp; MODES · FIVE VIEWS · FOUR OVERLAYS · ONE FORWARD PASS</text>
  <line x1="40" y1="82" x2="1560" y2="82" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>

  <text x="60" y="120" font-size="13" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">Modes</text>
  <text x="840" y="120" font-size="13" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">Keymap</text>

  <text x="60" y="150" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2.5">VIEW MODES · ONE AT A TIME</text><line x1="60" y1="162" x2="780" y2="162" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>
    <rect x="60" y="176" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="210" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">JOURNEY</text>
    <text x="88" y="230" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">↑ ↓  ·  SPACE  ·  HOME / END</text>
    <line x1="290" y1="190" x2="290" y2="246" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="196" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Auto layer-by-layer cinematic tour. The default first-visit experience. Step manually or let it play.</div>
    </foreignObject>
  
    <rect x="60" y="274" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="308" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">SCENE</text>
    <text x="88" y="328" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">CLICK "SCENE" · DRAG · WHEEL</text>
    <line x1="290" y1="288" x2="290" y2="344" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="294" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Free 3D camera. Orbit, zoom, pan around the whole model. All ten panels float as world-anchored cards.</div>
    </foreignObject>
  
    <rect x="60" y="372" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="406" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">ATTENTION</text>
    <text x="88" y="426" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">CLICK "ATTENTION"</text>
    <line x1="290" y1="386" x2="290" y2="442" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="392" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Dims the 3D brain and raises the last-layer attention grid as the hero. Per-head matrix, full canvas.</div>
    </foreignObject>
  
    <rect x="60" y="470" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="504" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">LOGIT LENS</text>
    <text x="88" y="524" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">CLICK "LOGIT LENS"</text>
    <line x1="290" y1="484" x2="290" y2="540" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="490" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Dims the brain and raises the logit lens as hero — what each layer would predict if it were the last.</div>
    </foreignObject>
  
    <rect x="60" y="568" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="602" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">CINEMATIC</text>
    <text x="88" y="622" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">CLICK "CINEMATIC"</text>
    <line x1="290" y1="582" x2="290" y2="638" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="588" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Full-bleed brain with scrub bar + play / pause / step buttons. Slow down and walk through the forward pass.</div>
    </foreignObject>
  <text x="60" y="682" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2.5">OVERLAYS · STACK ON ANY VIEW</text><line x1="60" y1="694" x2="780" y2="694" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>
    <rect x="60" y="708" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="742" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">ABLATION</text>
    <text x="88" y="762" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">A</text>
    <line x1="290" y1="722" x2="290" y2="778" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="728" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Floating panel. Zero out attention, FFN, or RoPE per layer or globally and watch the output collapse.</div>
    </foreignObject>
  
    <rect x="60" y="806" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="840" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">BUTTERFLY</text>
    <text x="88" y="860" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">CLICK "🦋 BUTTERFLY"  ·  ?MODE=BUTTERFLY</text>
    <line x1="290" y1="820" x2="290" y2="876" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="826" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">URL-flag-gated demo. Transgenerational context compaction — tag → chrysalis → noise across 3 generations, then a needle question vs. lastN baseline.</div>
    </foreignObject>
  
    <rect x="60" y="904" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="938" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">KID</text>
    <text x="88" y="958" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">K</text>
    <line x1="290" y1="918" x2="290" y2="974" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="924" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Phi the Storyteller. The model narrates what it is doing in plain English while it thinks. ELI5 walkthrough.</div>
    </foreignObject>
  
    <rect x="60" y="1002" width="720" height="84" rx="4" fill="rgba(31,35,40,0.025)" stroke="#1f2328" stroke-width="0.4" opacity="0.95"/>
    <text x="88" y="1036" font-size="22" font-family="Georgia, serif" fill="#1f2328" font-weight="300">SOFT</text>
    <text x="88" y="1056" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2">S</text>
    <line x1="290" y1="1016" x2="290" y2="1072" stroke="#1f2328" stroke-width="0.4" opacity="0.3"/>
    <foreignObject x="310" y="1022" width="450" height="48">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 13.5px; line-height: 1.45; color: #1f2328; opacity: 0.85; font-style: italic;">Renders activations as soft Gaussian sprites instead of hard points. Lower-contrast, more cinematic.</div>
    </foreignObject>
  
  <text x="840" y="150" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2.5">CAMERA</text><line x1="840" y1="162" x2="1540" y2="162" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>
    <rect x="840" y="170" width="48" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="864" y="185" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">drag</text>
  <text x="1010" y="186" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">orbit the model</text>
    <rect x="840" y="206" width="56" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="868" y="221" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">wheel</text>
  <text x="1010" y="222" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">zoom in / out</text>
    <rect x="840" y="242" width="96" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="888" y="257" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">right-drag</text>
  <text x="1010" y="258" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">pan the view</text>
    <rect x="840" y="278" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="293" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">R</text>
  <text x="1010" y="294" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">reset camera</text><text x="840" y="344" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2.5">JOURNEY</text><line x1="840" y1="356" x2="1540" y2="356" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>
    <rect x="840" y="364" width="48" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="864" y="379" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">↑  ↓</text>
  <text x="1010" y="380" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">step one layer</text>
    <rect x="840" y="400" width="56" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="868" y="415" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">space</text>
  <text x="1010" y="416" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">play / pause</text>
    <rect x="840" y="436" width="112" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="896" y="451" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">Home  ·  End</text>
  <text x="1010" y="452" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">first / last layer</text><text x="840" y="502" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2.5">PANELS</text><line x1="840" y1="514" x2="1540" y2="514" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>
    <rect x="840" y="522" width="88" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="884" y="537" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">P  ·  Tab</text>
  <text x="1010" y="538" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">toggle all panels</text>
    <rect x="840" y="558" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="573" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">O</text>
  <text x="1010" y="574" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">expand / collapse to orbs</text>
    <rect x="840" y="594" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="609" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">H</text>
  <text x="1010" y="610" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">hide HUD</text><text x="840" y="660" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#6e7781" letter-spacing="2.5">SYSTEM</text><line x1="840" y1="672" x2="1540" y2="672" stroke="#1f2328" stroke-width="0.5" opacity="0.35"/>
    <rect x="840" y="680" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="695" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">A</text>
  <text x="1010" y="696" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">ablation panel</text>
    <rect x="840" y="716" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="731" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">S</text>
  <text x="1010" y="732" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">soft Gaussian sprites</text>
    <rect x="840" y="752" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="767" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">K</text>
  <text x="1010" y="768" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">kid-mode storyteller</text>
    <rect x="840" y="788" width="28" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="854" y="803" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">?</text>
  <text x="1010" y="804" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">glossary overlay</text>
    <rect x="840" y="824" width="40" height="22" rx="4" fill="none" stroke="#1f2328" stroke-width="0.8" opacity="0.85"/>
    <text x="860" y="839" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#1f2328" text-anchor="middle">Esc</text>
  <text x="1010" y="840" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#1f2328" opacity="0.9">close any overlay</text>
</svg>
