<svg viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Controls and modes — the seven modes and the full keymap">
  <rect width="1600" height="920" fill="#0a0a0a"/>

  <text x="800" y="56" font-size="14" font-family="'SF Mono', Menlo, monospace" fill="#9aa0a6" text-anchor="middle" letter-spacing="4">CONTROLS &amp; MODES · SEVEN WAYS TO LOOK AT IT</text>
  <line x1="40" y1="82" x2="1560" y2="82" stroke="#ffffff" stroke-width="0.5" opacity="0.35"/>

  <text x="60" y="116" font-size="13" font-family="Georgia, serif" font-style="italic" fill="#f5f5f5" opacity="0.9">Modes</text>
  <text x="840" y="116" font-size="13" font-family="Georgia, serif" font-style="italic" fill="#f5f5f5" opacity="0.9">Keymap</text>

  
      <rect x="60" y="150" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
      <text x="88" y="186" font-size="22" font-family="Georgia, serif" fill="#f5f5f5" font-weight="300">JOURNEY</text>
      <text x="88" y="206" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#9aa0a6" letter-spacing="2">↑ ↓  ·  SPACE  ·  HOME / END</text>
      <foreignObject x="280" y="170" width="480" height="56">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 14px; line-height: 1.45; color: #f5f5f5; opacity: 0.85; font-style: italic;">Layer-by-layer guided tour. Auto-plays through the 32 transformer blocks; pause and step. The default first-visit experience.</div>
      </foreignObject>
      <line x1="260" y1="164" x2="260" y2="222" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>
    
      <rect x="60" y="250" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
      <text x="88" y="286" font-size="22" font-family="Georgia, serif" fill="#f5f5f5" font-weight="300">SCENE</text>
