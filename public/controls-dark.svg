      <foreignObject x="280" y="270" width="480" height="56">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 14px; line-height: 1.45; color: #f5f5f5; opacity: 0.85; font-style: italic;">Free 3D camera. Orbit, zoom, and pan around the whole model. Panels float as world-anchored cards.</div>
      </foreignObject>
      <line x1="260" y1="264" x2="260" y2="322" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>
    
      <rect x="60" y="350" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
      <text x="88" y="386" font-size="22" font-family="Georgia, serif" fill="#f5f5f5" font-weight="300">ABLATION</text>
      <text x="88" y="406" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#9aa0a6" letter-spacing="2">A</text>
      <foreignObject x="280" y="370" width="480" height="56">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 14px; line-height: 1.45; color: #f5f5f5; opacity: 0.85; font-style: italic;">Zero out attention, FFN, or RoPE and watch the output collapse. Shows what each circuit contributes.</div>
      </foreignObject>
      <line x1="260" y1="364" x2="260" y2="422" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>
    
      <rect x="60" y="450" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
      <text x="88" y="486" font-size="22" font-family="Georgia, serif" fill="#f5f5f5" font-weight="300">BUTTERFLY</text>
      <text x="88" y="506" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#9aa0a6" letter-spacing="2">AUTO</text>
      <foreignObject x="280" y="470" width="480" height="56">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 14px; line-height: 1.45; color: #f5f5f5; opacity: 0.85; font-style: italic;">Transgenerational context-compaction demo. Tag-and-rebuild each message (keep / summarize / melt), inject noise between generations, then a needle question runs against the butterfly memory vs a recency-truncated baseline at the same token budget.</div>
      </foreignObject>
      <line x1="260" y1="464" x2="260" y2="522" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>
    
      <rect x="60" y="550" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
      <text x="88" y="586" font-size="22" font-family="Georgia, serif" fill="#f5f5f5" font-weight="300">KID</text>
      <text x="88" y="606" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#9aa0a6" letter-spacing="2">K</text>
      <foreignObject x="280" y="570" width="480" height="56">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 14px; line-height: 1.45; color: #f5f5f5; opacity: 0.85; font-style: italic;">Storyteller overlay. Phi-3 explains itself in plain English while it thinks. For ELI5 walkthroughs.</div>
      </foreignObject>
      <line x1="260" y1="564" x2="260" y2="622" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>
    
      <rect x="60" y="650" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
