      <text x="88" y="706" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#9aa0a6" letter-spacing="2">SPEED SLIDER</text>
      <foreignObject x="280" y="670" width="480" height="56">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Georgia, serif; font-size: 14px; line-height: 1.45; color: #f5f5f5; opacity: 0.85; font-style: italic;">Slows generation so you can scrub through the forward pass tick by tick. Great for capture.</div>
      </foreignObject>
      <line x1="260" y1="664" x2="260" y2="722" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>
    
      <rect x="60" y="750" width="720" height="86" rx="4" fill="rgba(255,255,255,0.025)" stroke="#ffffff" stroke-width="0.4" opacity="0.95"/>
