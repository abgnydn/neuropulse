<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="neuropulse — real-time 1:1 visualization of a full-scale LLM forward pass">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.9" fill="#1f2328"/>
    </pattern>
    <radialGradient id="lens" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </radialGradient>
    <mask id="lensMask">
      <rect width="1200" height="460" fill="url(#lens)"/>
    </mask>
    <linearGradient id="topFade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fafafa" stop-opacity="0.85"/>
      <stop offset="22%" stop-color="#fafafa" stop-opacity="0"/>
      <stop offset="78%" stop-color="#fafafa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fafafa" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1f2328" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1f2328" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1f2328" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="460" fill="#fafafa"/>
  <rect width="1200" height="460" fill="url(#dots)" mask="url(#lensMask)"/>
  <rect width="1200" height="460" fill="url(#topFade)"/>

  <line x1="200" y1="135" x2="1000" y2="135" stroke="url(#hairline)" stroke-width="0.6"/>
  <line x1="200" y1="325" x2="1000" y2="325" stroke="url(#hairline)" stroke-width="0.6"/>

  <text x="600" y="240" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="84"
        font-weight="300"
        fill="#1f2328"
        letter-spacing="24">neuropulse</text>

  <text x="600" y="298" text-anchor="middle"
        font-family="'SF Mono', Menlo, Consolas, monospace"
        font-size="11"
        fill="#6e7781"
        letter-spacing="6">3.8B PARAMETERS  ·  YOUR GPU  ·  YOUR BROWSER  ·  EVERY TENSOR 1:1</text>
</svg>
